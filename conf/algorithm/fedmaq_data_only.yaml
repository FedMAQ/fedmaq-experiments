# Ablation Arm 3: Data Awareness Only.
# Only the dataset size signal (n_k) drives quantization; gradient norm is zeroed out.
# Uses formulation 1 (Linear Weighted Sum) with gamma1=0, gamma2=1.
# q_hat = q_min + round((q_max - q_min) * tilde_n_k)
# Usage: uv run python scripts/run.py algorithm=fedmaq_data_only
name: fedmaq
q_min: 1
q_max: 16
c_unit: 512.0
bit_widths: [1, 2, 3, 4, 5, 6, 7, 8, 16, 32]  # manuscript Q set (matches DEFAULT_BIT_WIDTHS)
formulation: 1            # Linear Sum
gamma1: 0.0               # Gradient signal disabled
gamma2: 1.0               # Dataset size signal only
lambda_val: 1.0
tau_g: 0.5
tau_n: 0.5

temperature: 1.0
kd_epochs: 1
server_kd_lr: 0.01
server_kd_momentum: 0.9
server_compute_speed: 2000.0  # simulated server samples/sec for server-side KD delay (§3.3)

# Post-processing pipeline (§4.3, FedMAQ-only) — not applicable here.
post_process: false
