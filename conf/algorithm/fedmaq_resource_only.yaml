# Ablation Arm 2: Resource Awareness Only.
# Only the Tier-1 hard memory cap is active; no gradient/dataset soft quality signal.
# q_k = min(floor(c_k / c_unit), q_max) — purely memory-constrained.
# Usage: uv run python scripts/run.py algorithm=fedmaq_resource_only
name: fedmaq
q_min: 1
q_max: 16
c_unit: 512.0
bit_widths: [1, 2, 3, 4, 5, 6, 7, 8, 16, 32]  # manuscript Q set (matches DEFAULT_BIT_WIDTHS)
formulation: 0            # Resource-only: soft target = q_max, only Tier-1 constrains

# Tier-2 unused for formulation 0 (kept for schema consistency)
gamma1: 0.5
gamma2: 0.5
lambda_val: 1.0
tau_g: 0.5
tau_n: 0.5

# Server-side KD enabled for fair comparison with full FedMAQ
temperature: 1.0
kd_epochs: 1
server_kd_lr: 0.01
server_kd_momentum: 0.9
server_compute_speed: 5000.0  # simulated server samples/sec for MobileNetV2GN KD (NVIDIA L40S 48GB GPU, ADR-0002)

# Post-processing pipeline (§4.3, FedMAQ-only) — not applicable here.
post_process: false
