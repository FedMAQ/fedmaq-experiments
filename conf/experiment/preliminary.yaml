# Preliminary experiment config — fast iterative runs before full benchmarking.
# NOT for production experiments. Use experiment=preliminary for staged development.
# Usage: uv run python scripts/run.py experiment=preliminary
#
# Differences from default (production):
#   num_clients: 50  (vs 100)
#   total_rounds: 10 (vs 100)
num_clients: 50
batch_size: 64            # B
local_epochs: 5           # E
learning_rate: 0.01       # eta (base learning rate)
learning_rate_decay: 0.99 # gamma (per-round exponential decay factor)
weight_decay: 0.0001      # lambda (SGD weight decay, 10^-4)
momentum: 0.9             # beta (SGD momentum)
client_fraction: 0.2      # C (20% per round)
total_rounds: 10          # Preliminary staging value
num_public_samples: 3000  # |D_pub| per manuscript §4.3, Table 4.1
client_gpus: 0.2          # GPU resource fraction allocated per client simulator

# Bandwidth and Compute settings (uniform)
bandwidth_mbps: 10.0
compute_samples_per_sec: 200.0

# Telemetry settings
telemetry:
  wandb_enabled: false
  project: "fedmaq-experiments"
  mode: "offline"
  run_name: null

# Local model checkpoint persistence for distillation baselines (e.g. FedMD)
persistence_dir: ".data_partitions/fedmd_models"
