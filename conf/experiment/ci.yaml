# CI / fast-testing experiment — NOT for production runs.
# Inherits all Table 4.1 defaults, then shrinks rounds/clients for speed.
# Usage: uv run python scripts/run.py experiment=ci
#
# NOTE: this is a full experiment config (selected with `experiment=ci`, not
# `+experiment=ci`) because `experiment` is a regular composition group. It pulls
# in default.yaml so the code still sees batch_size, learning_rate, etc.
defaults:
  - default

total_rounds: 2
num_clients: 2
